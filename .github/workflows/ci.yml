name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: cargo build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build wasamo
        run: cargo build --release -p wasamo
