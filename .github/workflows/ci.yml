name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: cargo build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (workspace, release)
        run: cargo build --release --workspace

      # Builds the debug-profile libs (including wasamo-runtime's cdylib).
      # The next step (`cargo test --workspace`) compiles test binaries
      # in the debug profile; if the debug-profile wasamo.dll.lib isn't
      # already present when wasamo-sys's test binary reaches its link
      # step, link.exe fails (wasamo-sys has no Rust dep on
      # wasamo-runtime — it crosses the C ABI). Sequencing the lib
      # build before the test build sidesteps the parallel-scheduling
      # window where the import lib hasn't been emitted yet.
      - name: Build (workspace, debug — for tests)
        run: cargo build --workspace

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Setup MSVC dev environment
        uses: matarillo/msvc-dev-cmd@v1-node24

      - name: C ABI smoke test (MSVC cl)
        shell: cmd
        run: |
          cl /nologo /W3 /utf-8 /c /I bindings\c bindings\c\smoke.c /Fo:smoke_msvc.obj
          link /nologo smoke_msvc.obj target\release\wasamo.dll.lib /OUT:smoke_msvc.exe

      - name: C ABI smoke test (clang-cl)
        shell: cmd
        run: |
          clang-cl /nologo /W3 /utf-8 /c /I bindings\c bindings\c\smoke.c /Fo:smoke_clang.obj
          lld-link /nologo smoke_clang.obj target\release\wasamo.dll.lib /OUT:smoke_clang.exe

      - name: CMake smoke test
        run: |
          cmake -S bindings/c -B build/cmake-c
          cmake --build build/cmake-c --config Release

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Zig binding smoke test
        run: zig build test --wasamo-lib ../../target/release/wasamo.dll.lib
        working-directory: bindings/zig
