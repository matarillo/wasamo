name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: cargo build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (workspace, release)
        run: cargo build --release --workspace

      # Builds the debug-profile libs (including wasamo-dll's cdylib).
      # The next step (`cargo test --workspace`) compiles test binaries
      # in the debug profile; if the debug-profile wasamo.dll.lib isn't
      # already present when wasamo-sys's test binary reaches its link
      # step, link.exe fails. The build-order edge from wasamo-sys →
      # wasamo-dll (DD-M2-P1-006) handles in-build ordering, but this
      # explicit pre-build step avoids any residual race in the
      # debug-profile scheduler.
      - name: Build (workspace, debug — for tests)
        run: cargo build --workspace

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Setup MSVC dev environment
        uses: matarillo/msvc-dev-cmd@release/v1-node24

      - name: C ABI smoke test (MSVC cl)
        shell: cmd
        run: |
          cl /nologo /W3 /utf-8 /c /I bindings\c bindings\c\smoke.c /Fo:smoke_msvc.obj
          link /nologo smoke_msvc.obj target\release\wasamo.dll.lib /OUT:smoke_msvc.exe

      - name: C ABI smoke test (clang-cl)
        shell: cmd
        run: |
          clang-cl /nologo /W3 /utf-8 /c /I bindings\c bindings\c\smoke.c /Fo:smoke_clang.obj
          lld-link /nologo smoke_clang.obj target\release\wasamo.dll.lib /OUT:smoke_clang.exe

      - name: CMake smoke test
        run: |
          cmake -S bindings/c -B build/cmake-c
          cmake --build build/cmake-c --config Release

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Zig binding smoke test
        run: zig build test "-Dwasamo-lib=../../target/release/wasamo.dll.lib"
        working-directory: bindings/zig

      - name: counter-c (CMake, Release)
        run: |
          cmake -S examples/counter-c -B build/counter-c
          cmake --build build/counter-c --config Release

      - name: counter-rust (cargo, release)
        run: cargo build --release -p counter-rust

      - name: counter-zig (Zig, ReleaseSafe)
        run: zig build -p . "-Dwasamo-lib=../../target/release/wasamo.dll.lib" "-Dwasamo-zig=../../bindings/zig/wasamo.zig" "-Doptimize=ReleaseSafe"
        working-directory: examples/counter-zig

      - name: wasamoc check counter.ui
        run: cargo run --release -p wasamoc -- check examples/counter/counter.ui
